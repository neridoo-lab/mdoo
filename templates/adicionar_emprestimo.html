{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><h4><i class="fas fa-plus-circle me-2"></i>Novo Empréstimo</h4></div>
      <div class="card-body">
        <form method="POST" id="formEmprestimo">
          <div class="mb-3">
            <label>Cliente *</label>
            <select name="cliente_id" class="form-select" required>
              <option value="">Selecione...</option>
              {% for c in clientes %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}
            </select>
          </div>
          <div class="mb-3"><label>Valor *</label>
            <div class="input-group">
              <span class="input-group-text">R$</span>
              <input type="number" step="0.01" name="valor" class="form-control" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Juros ao mês (%) *</label>
              <div class="input-group">
                <input type="number" step="0.01" name="juros_mensal" class="form-control" value="5" required>
                <span class="input-group-text">%</span>
              </div>
            </div>
            <div class="col-md-6 mb-3">
              <label>Juros por Vencimento (% ao mês)</label>
              <div class="input-group">
                <input type="number" step="0.01" name="juros_vencimento" class="form-control" value="{{ juros_vencimento_padrao }}">
                <span class="input-group-text">%</span>
              </div>
            </div>
          </div>
          <div class="mb-3"><label>Nº de parcelas *</label><input type="number" name="quantidade_parcelas" class="form-control" value="12" required></div>
          <div class="mb-3"><label>Data da 1ª parcela *</label><input type="date" name="data_primeira_parcela" class="form-control" required></div>
          
          <div class="mb-3">
            <div class="alert alert-info">
              <h6>Resumo do Empréstimo:</h6>
              <div id="resumo"><p>Preencha os campos acima para ver o resumo</p></div>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Criar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('formEmprestimo').addEventListener('input', function() {
    const valor = parseFloat(document.getElementById('valor').value) || 0;
    const juros = parseFloat(document.getElementById('juros_mensal').value) || 0;
    const parcelas = parseInt(document.getElementById('quantidade_parcelas').value) || 0;
    
    if (valor > 0 && parcelas > 0) {
        const valorTotal = valor * (1 + juros/100 * parcelas);
        const valorParcela = valorTotal / parcelas;
        
        document.getElementById('resumo').innerHTML = `
            <p><strong>Valor Total com Juros:</strong> R$ ${valorTotal.toFixed(2).replace('.', ',')}</p>
            <p><strong>Valor de Cada Parcela:</strong> R$ ${valorParcela.toFixed(2).replace('.', ',')}</p>
            <p><strong>Total de Juros:</strong> R$ ${(valorTotal - valor).toFixed(2).replace('.', ',')}</p>
        `;
    }
});
</script>
{% endblock %}
