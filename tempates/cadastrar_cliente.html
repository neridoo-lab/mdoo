{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header"><h4><i class="fas fa-user-plus me-2"></i>Cadastrar Cliente</h4></div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3"><label>Nome *</label><input type="text" name="nome" class="form-control" required></div>
          <div class="mb-3"><label>Telefone</label><input type="text" name="telefone" class="form-control"></div>
          <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control"></div>
          <button type="submit" class="btn btn-primary w-100"><i class="fas fa-save me-2"></i>Salvar</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
